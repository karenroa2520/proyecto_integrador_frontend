<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <title>Crear tareas</title>
</head>

<body>
    <!-- VISTA 2: Tareas -->
    <div id="vistaTareas" class="vista">

        <div class="vistaHeader">
            <h1>Tareas</h1>
            <a href="../index.html" class="btn btnPrimary">Ir a Registro de Usuarios</a>
        </div>

        <!-- FORMULARIO CREAR / EDITAR TAREA -->
        <div class="seccionTareas">
            <form id="formTarea" class="formSection">
                <div class="formGroup">
                    <label for="docTarea" class="formLabel">Documento del usuario</label>
                    <input type="text" name="docTarea" id="docTarea" class="formInput" placeholder="Ingrese documento del usuario">
                </div>
                <div class="formGroup">
                    <label for="tituloTarea" class="formLabel">Titulo de la tarea</label>
                    <input type="text" name="tituloTarea" id="tituloTarea" class="formInput" placeholder="Ingrese el titulo">
                </div>
                <div class="formGroup">
                    <label for="descripcionTarea" class="formLabel">Descripcion</label>
                    <input type="text" name="descripcionTarea" id="descripcionTarea" class="formInput formTextarea" placeholder="Ingrese la descripcion">
                </div>
                <div class="formGroup">
                    <label for="estadoTarea" class="formLabel">Estado</label>
                    <select name="estadoTarea" id="estadoTarea" class="formInput">
                        <option value="pendiente">Pendiente</option>
                        <option value="en proceso">En proceso</option>
                        <option value="completada">Completada</option>
                    </select>
                </div>
                <div class="formGroup">
                    <button class="btn btnPrimary" id="btnCrearTarea">Crear Tarea</button>
                </div>
            </form>
        </div>

        <!-- FILTROS AVANZADOS - RF01 -->
        <div class="seccionFiltros">
            <h2>Filtros y Ordenamiento</h2>
            <div class="filtrosFila">
                <div class="formGroup">
                    <label for="filtroUsuario" class="formLabel">Filtrar por Usuario</label>
                    <input type="text" id="filtroUsuario" class="formInput" placeholder="Documento del usuario">
                </div>
                <div class="formGroup">
                    <label for="filtroDocumento" class="formLabel">Filtrar por Documento</label>
                    <input type="text" id="filtroDocumento" class="formInput" placeholder="Documento">
                </div>
                <div class="formGroup">
                    <label for="filtroEstado" class="formLabel">Filtrar por Estado</label>
                    <select id="filtroEstado" class="formInput">
                        <option value="">Todos los estados</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="en proceso">En proceso</option>
                        <option value="completada">Completada</option>
                    </select>
                </div>
                <div class="formGroup">
                    <label for="selectOrden" class="formLabel">Ordenar por</label>
                    <select id="selectOrden" class="formInput">
                        <option value="">Sin ordenar</option>
                        <option value="nombre">Nombre</option>
                        <option value="estado">Estado</option>
                        <option value="fecha">Fecha de creacion</option>
                    </select>
                </div>
                <div class="filtrosAcciones">
                    <button class="btn btnPrimary" id="btnAplicarFiltros">Aplicar Filtros</button>
                    <button class="btn btnSecondary" id="btnLimpiarFiltros">Limpiar Filtros</button>
                    <button class="btn btnSecondary" id="btnExportar">Exportar JSON</button>
                </div>
            </div>
        </div>

        <!-- LISTA DE TAREAS -->
        <div id="listaTareas" class="listaTareas"></div>

    </div>
    <script src="../crearTareas.js" type="module"></script>
</body>

</html>
